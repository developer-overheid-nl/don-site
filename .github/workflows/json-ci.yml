name: JSON CI

on: pull_request

jobs:
  lint-and-validate:
    name: JSON Lint & OpenAPI Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@vde0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Run Super-Linter
        uses: super-linter/super-linter@61abc07d755095a68f4987d1c2c3d1d64408f1f9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: "(^|.*/)\\.vscode/|(^|.*/)tsconfig(\\..+)?\\.json$"
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_JSON: true
          VALIDATE_OPENAPI: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
